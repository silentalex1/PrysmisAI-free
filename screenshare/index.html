<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrysmisAI — Screen Share</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d12;
  --surface: #14141c;
  --card: #1a1a26;
  --border: #2a2a3a;
  --text: #e0e0f0;
  --dim: #7a7a98;
  --teal: #00bcbc;
  --teal-glow: rgba(0,188,188,0.18);
  --purple: #7c3aed;
  --purple-light: #a78bfa;
  --green: #22c55e;
  --red: #ef4444;
  --navbar-h: 52px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

#navbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--navbar-h);
  background: #0a0a10;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 18px; gap: 14px;
  z-index: 100;
}

.nav-brand {
  font-size: 17px; font-weight: 800;
  background: linear-gradient(135deg, #00e0e0, #a78bfa);
  background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.3px; flex-shrink: 0;
}

.nav-status {
  display: flex; align-items: center; gap: 7px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 12px; font-size: 11px;
  color: var(--dim);
}

.nav-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); flex-shrink: 0;
  transition: background 0.3s;
}
.nav-status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

.nav-spacer { flex: 1; }

.nav-btn {
  padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: all 0.15s;
}

.nav-start-btn {
  background: var(--teal); color: #000;
}
.nav-start-btn:hover { background: #00d4d4; }

.nav-stop-btn {
  background: rgba(239,68,68,0.15); color: var(--red);
  border: 1px solid rgba(239,68,68,0.3);
  display: none;
}
.nav-stop-btn:hover { background: rgba(239,68,68,0.25); }

#main-layout {
  position: fixed; top: var(--navbar-h); left: 0; right: 0; bottom: 0;
  display: flex; gap: 0;
}

#screen-panel {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #080810; position: relative; overflow: hidden;
}

#screen-canvas {
  max-width: 100%; max-height: 100%;
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  display: none;
}

#screen-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  color: var(--dim);
}

.placeholder-icon {
  width: 64px; height: 64px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
}

.placeholder-icon svg { opacity: 0.4; }

#screen-placeholder h3 { font-size: 15px; font-weight: 600; color: var(--text); }
#screen-placeholder p { font-size: 12px; color: var(--dim); text-align: center; max-width: 260px; line-height: 1.5; }

#chat-panel {
  width: 360px; flex-shrink: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}

#chat-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--dim);
  text-transform: uppercase; letter-spacing: 0.6px; flex-shrink: 0;
}

#chat-messages {
  flex: 1; overflow-y: auto; padding: 14px 14px 6px;
  display: flex; flex-direction: column; gap: 10px;
}

#chat-messages::-webkit-scrollbar { width: 3px; }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-wrap { display: flex; flex-direction: column; gap: 3px; }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.ai { align-items: flex-start; }

.msg-label { font-size: 10px; color: var(--dim); padding: 0 6px; }

.msg-bubble {
  max-width: 90%; padding: 9px 13px;
  border-radius: 12px; font-size: 13px; line-height: 1.5;
  word-break: break-word;
}
.msg-bubble.user {
  background: var(--teal); color: #000; font-weight: 500;
  border-bottom-right-radius: 4px;
}
.msg-bubble.ai {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  border-bottom-left-radius: 4px;
}
.msg-bubble.ai.streaming { border-color: var(--teal); }

.msg-code-block {
  margin-top: 8px; background: #0a0a14;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-family: 'Fira Code', 'Courier New', monospace;
  font-size: 11px; color: #a0d4ff; overflow-x: auto; white-space: pre;
  max-height: 200px; overflow-y: auto;
}

#change-bar {
  flex-shrink: 0; padding: 10px 14px;
  background: rgba(0,188,188,0.06);
  border-top: 1px solid rgba(0,188,188,0.15);
  display: none; flex-direction: column; gap: 8px;
}

.change-bar-label {
  font-size: 11px; color: var(--dim);
}

.change-btns { display: flex; gap: 8px; }

.change-accept {
  flex: 1; padding: 8px; border: none; border-radius: 7px;
  background: var(--green); color: #fff; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.change-accept:hover { background: #16a34a; }

.change-decline {
  flex: 1; padding: 8px; border-radius: 7px;
  background: rgba(239,68,68,0.1); color: var(--red);
  border: 1px solid rgba(239,68,68,0.25); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.change-decline:hover { background: rgba(239,68,68,0.2); }

#chat-input-area {
  flex-shrink: 0; padding: 12px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
}

#chat-textarea {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 13px;
  padding: 9px 12px; resize: none; outline: none;
  font-family: inherit; min-height: 40px; max-height: 120px;
  transition: border-color 0.15s; line-height: 1.5;
}
#chat-textarea::placeholder { color: var(--dim); }
#chat-textarea:focus { border-color: var(--teal); }

#send-btn {
  width: 38px; height: 38px; flex-shrink: 0;
  background: var(--teal); border: none; border-radius: 9px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
#send-btn:hover { background: #00d4d4; }
#send-btn:disabled { background: var(--border); cursor: not-allowed; }
#send-btn svg { color: #000; }

.thinking-dots span {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--dim); margin: 0 2px; animation: bounce 1.2s infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}
</style>
</head>
<body>
<div id="navbar">
  <div class="nav-brand">PrysmisAI</div>
  <div class="nav-status">
    <div class="nav-status-dot" id="status-dot"></div>
    <span id="status-label">Not sharing</span>
  </div>
  <div class="nav-spacer"></div>
  <button class="nav-btn nav-start-btn" id="start-btn" onclick="startSharing()">Start Sharing</button>
  <button class="nav-btn nav-stop-btn" id="stop-btn" onclick="stopSharing()">Stop Sharing</button>
</div>

<div id="main-layout">
  <div id="screen-panel">
    <div id="screen-placeholder">
      <div class="placeholder-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <h3>Share your screen</h3>
      <p>Click "Start Sharing" to let PrysmisAI see your Roblox Studio and get AI-powered suggestions.</p>
    </div>
    <canvas id="screen-canvas"></canvas>
  </div>

  <div id="chat-panel">
    <div id="chat-header">Ask PrysmisAI</div>
    <div id="chat-messages"></div>
    <div id="change-bar">
      <div class="change-bar-label">PrysmisAI suggested a change to your Studio</div>
      <div class="change-btns">
        <button class="change-accept" onclick="acceptChange()">Accept Change</button>
        <button class="change-decline" onclick="declineChange()">Decline Change</button>
      </div>
    </div>
    <div id="chat-input-area">
      <textarea id="chat-textarea" placeholder="Ask PrysmisAI anything..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  var token = new URLSearchParams(window.location.search).get('token') || '';
  var mediaStream = null;
  var videoEl = null;
  var captureInterval = null;
  var isSharing = false;
  var isGenerating = false;
  var pendingCode = null;

  var canvas = document.getElementById('screen-canvas');
  var ctx = canvas.getContext('2d');
  var messagesEl = document.getElementById('chat-messages');
  var textarea = document.getElementById('chat-textarea');
  var sendBtn = document.getElementById('send-btn');
  var changeBar = document.getElementById('change-bar');
  var statusDot = document.getElementById('status-dot');
  var statusLabel = document.getElementById('status-label');
  var startBtn = document.getElementById('start-btn');
  var stopBtn = document.getElementById('stop-btn');
  var placeholder = document.getElementById('screen-placeholder');

  function setStatus(sharing) {
    isSharing = sharing;
    statusDot.className = 'nav-status-dot' + (sharing ? ' active' : '');
    statusLabel.textContent = sharing ? 'Sharing screen' : 'Not sharing';
    startBtn.style.display = sharing ? 'none' : '';
    stopBtn.style.display = sharing ? '' : 'none';
    canvas.style.display = sharing ? 'block' : 'none';
    placeholder.style.display = sharing ? 'none' : 'flex';
  }

  window.startSharing = async function() {
    try {
      mediaStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: 'always', frameRate: 60, width: { ideal: 3840 }, height: { ideal: 2160 } },
        audio: false
      });

      videoEl = document.createElement('video');
      videoEl.srcObject = mediaStream;
      videoEl.play();

      videoEl.onloadedmetadata = function() {
        canvas.width = videoEl.videoWidth;
        canvas.height = videoEl.videoHeight;
        setStatus(true);
        drawFrame();
        captureInterval = setInterval(drawFrame, 16);
      };

      mediaStream.getVideoTracks()[0].onended = function() {
        stopSharing();
      };

      addSystemMessage('Screen sharing started. PrysmisAI can now see your screen. Ask anything!');
    } catch(e) {
      addSystemMessage('Could not start screen sharing: ' + e.message);
    }
  };

  window.stopSharing = function() {
    if (mediaStream) {
      mediaStream.getTracks().forEach(function(t) { t.stop(); });
      mediaStream = null;
    }
    if (captureInterval) { clearInterval(captureInterval); captureInterval = null; }
    if (videoEl) { videoEl.srcObject = null; videoEl = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setStatus(false);
    addSystemMessage('Screen sharing stopped.');
    setTimeout(function() { window.close(); }, 1200);
  };

  function drawFrame() {
    if (!videoEl || videoEl.readyState < 2) return;
    canvas.width = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    ctx.drawImage(videoEl, 0, 0);
  }

  function captureFrame() {
    if (!isSharing || !videoEl || videoEl.readyState < 2) return null;
    var tmp = document.createElement('canvas');
    tmp.width = Math.min(videoEl.videoWidth, 1280);
    tmp.height = Math.round(tmp.width * videoEl.videoHeight / videoEl.videoWidth);
    var tc = tmp.getContext('2d');
    tc.drawImage(videoEl, 0, 0, tmp.width, tmp.height);
    return tmp.toDataURL('image/jpeg', 0.7).replace('data:image/jpeg;base64,', '');
  }

  function addSystemMessage(text) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'text-align:center;font-size:11px;color:var(--dim);padding:4px 0;';
    wrap.textContent = text;
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function addMessage(role, text, code) {
    var wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + role;

    var label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'PrysmisAI';

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + role;
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);

    if (code) {
      var codeBlock = document.createElement('pre');
      codeBlock.className = 'msg-code-block';
      codeBlock.textContent = code;
      bubble.appendChild(codeBlock);
    }

    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function addThinking() {
    var wrap = document.createElement('div');
    wrap.className = 'msg-wrap ai';
    wrap.id = 'thinking-wrap';

    var label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'PrysmisAI';

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble ai streaming';
    bubble.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function removeThinking() {
    var el = document.getElementById('thinking-wrap');
    if (el) el.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  window.acceptChange = function() {
    if (!pendingCode || !token) return;
    addSystemMessage('Change accepted! This feature requires Studio plugin integration.');
    pendingCode = null;
    changeBar.style.display = 'none';
  };

  window.declineChange = function() {
    pendingCode = null;
    changeBar.style.display = 'none';
    addSystemMessage('Change declined.');
  };

  window.sendMessage = async function() {
    if (isGenerating) return;
    var msg = textarea.value.trim();
    if (!msg) return;

    textarea.value = '';
    autoGrow(textarea);
    addMessage('user', msg);

    if (!token) {
      addMessage('ai', 'No token found. Close this window and reconnect the plugin.');
      return;
    }

    isGenerating = true;
    sendBtn.disabled = true;
    var thinkEl = addThinking();

    var frame = captureFrame();

    try {
      var resp = await fetch('http://127.0.0.1:11434/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'PrysmisAI',
          prompt: 'You are PrysmisAI, an expert Roblox Studio AI assistant. You can see the user screen. When suggesting Lua code changes, always wrap code at the END of your response like this: PRYSMIS_CODE_START{"code":"-- lua here"}PRYSMIS_CODE_END. Only include this block if you have actual code to apply. Keep your response helpful and concise.\n\nUser: ' + msg + (frame ? '\n\n[Screen capture provided]' : ''),
          stream: false,
          options: { num_predict: 2048, temperature: 0.7 }
        })
      });

      var data = await resp.json();
      removeThinking();

      if (data.response) {
        var responseText = data.response;
        var code = null;
        var codeMatch = responseText.match(/PRYSMIS_CODE_START({.*?})PRYSMIS_CODE_END/s);
        if (codeMatch) {
          try { var parsed = JSON.parse(codeMatch[1]); code = parsed.code || null; } catch(e) {}
        }
        var displayText = responseText.replace(/PRYSMIS_CODE_START.*?PRYSMIS_CODE_END/s, '').trim();
        addMessage('ai', displayText, code || null);
        if (code) {
          pendingCode = code;
          changeBar.style.display = 'flex';
        }
      } else {
        addMessage('ai', 'Something went wrong. Try again.');
      }
    } catch(e) {
      removeThinking();
      addMessage('ai', 'PrysmisAI error: ' + e.message);
    }

    isGenerating = false;
    sendBtn.disabled = false;
    scrollToBottom();
  };

  window.handleKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  window.autoGrow = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };

  setStatus(false);
  addSystemMessage('Welcome! Click "Start Sharing" to begin.');
})();
</script>
</body>
</html>
