<div class="spanel" id="spanel-ai">
  <h3 class="spanel-title">AI Settings</h3>
  <div class="setting-group">
    <label>Enter in your gemini api key:</label>
    <div class="ai-key-wrap">
      <input type="password" id="gemini-key-input" placeholder="Paste your Google Gemini API key here..." autocomplete="off">
      <button class="setting-btn" id="gemini-key-toggle" onclick="toggleGeminiKeyVisibility()">Show</button>
    </div>
    <p class="pfp-hint">Get your key from the <a href="https://aistudio.google.com/app/apikey" target="_blank" class="ai-key-link">Google AI Studio</a>.</p>
    <button class="auth-btn" style="margin-top:10px; width:fit-content; padding: 8px 20px;" onclick="saveGeminiSettings()">Save Settings</button>
    <div class="setting-sub" id="gemini-key-status"></div>
  </div>
</div>
