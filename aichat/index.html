<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrysmisAI - Chat</title>
  <link rel="stylesheet" href="ai.css">
  <style>
    .btn-save-settings {
      margin-top: 20px;
      padding: 12px 32px;
      background: linear-gradient(145deg, #d4784e, #e8834a);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(212, 120, 78, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-save-settings:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 120, 78, 0.35);
      filter: brightness(1.1);
    }
    .btn-save-settings:active {
      transform: translateY(0);
    }
    .quota-box {
      margin-top: 15px;
      padding: 12px;
      background: rgba(224, 85, 85, 0.08);
      border: 1px solid rgba(224, 85, 85, 0.2);
      border-radius: 10px;
      display: none;
    }
    .quota-text {
      color: #f08080;
      font-size: 12px;
      line-height: 1.5;
    }
    .setting-sub-success {
      color: #4caf7d;
      font-size: 12px;
      margin-top: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="bg-grid-fixed"></div>
<div class="bg-glow-fixed"></div>

<div id="app">
  <aside id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">Prysmis<em>AI</em></div>
      <button class="new-chat-btn" onclick="newChat()">+ New chat</button>
      <div id="chat-history-list"></div>
    </div>
    <div class="sidebar-bottom">
      <button class="studio-files-btn" onclick="toggleStudioPanel()">Studio Files</button>
      <button class="settings-btn" onclick="openSettings()">Settings</button>
    </div>
  </aside>

  <div id="main">
    <nav class="chat-nav">
      <div class="chat-nav-left">
        <span class="nav-logo-small">Prysmis<em>AI</em></span>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchMainTab('chat', this)">AI Chat</button>
          <button class="nav-tab" onclick="switchMainTab('community-projects', this)">Community Projects</button>
          <button class="nav-tab" onclick="switchMainTab('community-chat', this)">Community Chat</button>
        </div>
      </div>
      <div class="chat-nav-right">
        <button class="nav-action-btn share-screen-btn" onclick="openShareScreen()">Share Screen</button>
        <button class="nav-action-btn" id="connect-plugin-btn" onclick="connectPlugin()">Connect plugin</button>
        <div class="status-pill">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-label">Ready</span>
        </div>
      </div>
    </nav>

    <div id="tab-chat" class="tab-content active">
      <div id="chat-area">
        <div id="welcome" class="welcome">
          <h1 class="welcome-title">What can I help you build?</h1>
          <p class="welcome-sub">Powered by Gemini 3 — professional Roblox generation.</p>
          <div class="quick-chips">
            <button class="chip" onclick="chipSend('I need help building a map')">Building a map</button>
            <button class="chip" onclick="chipSend('Make me a VFX of ')">Make me a VFX</button>
          </div>
        </div>
        <div id="messages"></div>
      </div>

      <div id="input-area">
        <div id="image-preview-row" class="image-preview-row"></div>
        <div class="input-model-row">
          <div class="input-model-wrap">
            <button class="input-model-btn" onclick="toggleInputModelDropdown()">
              <span id="input-model-label">Gemini 3</span>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
            <div class="input-model-list" id="input-model-list">
              <div class="input-model-option" onclick="selectInputModel(this)">Gemini 3</div>
            </div>
          </div>
        </div>
        <div class="input-box">
          <button class="attach-btn" onclick="document.getElementById('file-input').click()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageAttach(event)">
          <textarea id="user-input" placeholder="Ask Prysmis anything..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="tab-community-projects" class="tab-content">
      <div class="community-projects-tab"><div class="cp-tab-header"><div class="cp-tab-title">Projects</div></div></div>
    </div>
    <div id="tab-community-chat" class="tab-content">
      <div id="comm-messages" class="comm-messages"></div>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay" style="display:none" onclick="closeSettingsIfBg(event)">
    <div class="modal-card settings-modal-card">
      <div class="settings-layout">
        <div class="settings-sidebar">
          <div class="settings-brand">Prysmis<em>AI</em></div>
          <button class="stab active" onclick="switchStab(this,'account')">User Account</button>
          <button class="stab" onclick="switchStab(this,'ai')">AI Settings</button>
          <button class="stab" onclick="switchStab(this,'studio')">Studio</button>
          <button class="stab stab-logout" onclick="logout()">Log out</button>
        </div>
        <div class="settings-content">
          <button class="modal-close" onclick="closeSettings()">&times;</button>

          <div class="spanel active" id="spanel-account">
            <h3 class="spanel-title">User Account</h3>
            <div class="setting-group">
              <label>USERNAME</label>
              <div class="setting-sub" id="settings-username">Loading...</div>
            </div>
          </div>

          <div class="spanel" id="spanel-ai">
            <h3 class="spanel-title">AI Settings</h3>
            <div class="setting-group">
              <label>Enter in your gemini api key:</label>
              <div class="ai-key-wrap">
                <input type="password" id="gemini-key-input" placeholder="Paste Gemini Key" autocomplete="off">
                <button class="setting-btn" onclick="toggleGeminiKeyVisibility()">Show</button>
              </div>
              <button class="btn-save-settings" onclick="saveGeminiSettings()">Save Settings</button>
              <div id="gemini-key-status" class="setting-sub-success"></div>
              <div id="quota-box" class="quota-box">
                <div class="quota-text">Quota or API error detected. Ensure your Gemini API Key is valid and billing limits aren't exceeded.</div>
              </div>
            </div>
          </div>

          <div class="spanel" id="spanel-studio">
            <h3 class="spanel-title">Studio</h3>
            <div class="setting-group">
              <label>Plugin Token</label>
              <input type="text" id="studio-token-display" readonly style="background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; width: 100%;">
              <button class="setting-btn-regen" style="margin-top:10px;" onclick="regenToken()">Generate Token</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="ai.js"></script>
</body>
</html>
